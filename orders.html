<!DOCTYPE html>
<html>

<head>

<title>Buyurtmalar</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

</head>

<body class="p-4">

<h2>Yangi Buyurtmalar</h2>

<table class="table table-bordered table-striped">

<thead>

<tr>

<th>ID</th>
<th>Mijoz</th>
<th>Telefon</th>
<th>Suv</th>
<th>Hudud</th>
<th>Kuryer</th>

</tr>

</thead>

<tbody>

{% for o in orders %}

<tr>

<td>{{o.order_id}}</td>
<td>{{o.fish}}</td>
<td>{{o.phone}}</td>
<td>{{o.count}}</td>
<td>{{o.region}}</td>

<td>

<form action="/assign" method="post">

<input type="hidden" name="order_id" value="{{o.order_id}}">

<select name="courier_id" class="form-select">

{% for c in couriers %}
<option value="{{c.id}}">{{c.name}}</option>
{% endfor %}

</select>

<button class="btn btn-primary mt-1">Biriktirish</button>

</form>

</td>

</tr>

{% endfor %}

</tbody>

</table>

</body>
</html>
